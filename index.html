<!DOCTYPE html>
<html lang="ru">
<link rel="icon" href="favicon.png" type="image/png">
<link rel="apple-touch-icon" href="favicon.png">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Календарь с общим фоном</title>
<style>
body{
  margin:0;
  font-family:-apple-system, Arial;
  color:white;
  background:black;
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}
.overlay{
  background:rgba(0,0,0,0.55);
  min-height:100vh;
  padding:10px;
}
h1{text-align:center;margin:10px 0 15px 0;}
#calendar{text-align:center;}
.day{
  display:inline-block;
  width:13%;
  margin:1%;
  height:60px;
  background:rgba(0,0,0,0.7);
  border-radius:8px;
  line-height:60px;
  font-size:18px;
  cursor:pointer;
  position:relative;
}
.selected{outline:3px solid #4da3ff;}
.colors{display:flex;justify-content:center;gap:3px;position:absolute;bottom:4px;left:0;right:0;}
.dot{width:8px;height:8px;border-radius:50%;}
.controls{text-align:center;margin-top:20px;}
button{padding:8px 10px;border-radius:8px;border:none;margin:5px;}
</style>
</head>
<body>
<div class="overlay">
<h1 id="month"></h1>
<div id="calendar"></div>
<div class="controls">
<div id="selected">Выберите день</div>
<br>
<input type="color" id="color">
<button onclick="addColor()">Цвет</button>
<br><br>
<input type="file" accept="image/*" onchange="setWallpaper(event)">
</div>
</div>

<script>
const calendar=document.getElementById("calendar");
const monthEl=document.getElementById("month");
let now=new Date();
let year=now.getFullYear();
let month=now.getMonth();
monthEl.innerHTML=now.toLocaleString("ru",{month:"long",year:"numeric"});
let days=new Date(year,month+1,0).getDate();
let selectedDay=null;
let data=JSON.parse(localStorage.getItem("caldata")||"{}");

// Восстанавливаем общий фон при загрузке
if(localStorage.getItem("wallpaper")){
  document.body.style.backgroundImage="url("+localStorage.getItem("wallpaper")+")";
}

function buildCalendar(){
  calendar.innerHTML="";
  for(let i=1;i<=days;i++){
    let d=document.createElement("div");
    d.className="day";
    d.innerHTML=i;
    let key=year+"-"+month+"-"+i;
    if(data[key] && data[key].colors){
      let colorsDiv=document.createElement("div");
      colorsDiv.className="colors";
      data[key].colors.forEach(c=>{
        let dot=document.createElement("div");
        dot.className="dot";
        dot.style.background=c;
        colorsDiv.appendChild(dot);
      });
      d.appendChild(colorsDiv);
    }
    d.onclick=function(){
      selectedDay=year+"-"+month+"-"+this.innerHTML;
      document.getElementById("selected").innerHTML="День "+this.innerHTML;
      document.querySelectorAll(".day").forEach(dd=>dd.classList.remove("selected"));
      this.classList.add("selected");
    }
    calendar.appendChild(d);
  }
}

function addColor(){
  if(!selectedDay) return;
  let c=document.getElementById("color").value;
  if(!data[selectedDay]) data[selectedDay]={colors:[]};
  data[selectedDay].colors.push(c);
  localStorage.setItem("caldata",JSON.stringify(data));
  buildCalendar();
}

// Загружаем общий фон
function setWallpaper(e){
  let reader=new FileReader();
  reader.onload=function(){
    let img=reader.result;
    document.body.style.backgroundImage="url("+img+")";
    localStorage.setItem("wallpaper",img);
  }
  reader.readAsDataURL(e.target.files[0]);
}

buildCalendar();
</script>
</body>
</html>
