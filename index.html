<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Календарь с правильными днями</title>
<style>
body{
  margin:0;
  font-family:-apple-system, Arial;
  color:white;
  background:black;
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}
.overlay{
  background:rgba(0,0,0,0.55);
  min-height:100vh;
  padding:10px;
}
h1{text-align:center;margin:10px 0 5px 0;}
#weekdays{text-align:center;margin-bottom:5px;}
.weekday{
  display:inline-block;
  width:13%;
  text-align:center;
  font-weight:bold;
}
#calendar{text-align:center;}
.day{
  display:inline-block;
  width:13%;
  margin:1%;
  min-height:80px;
  background:rgba(0,0,0,0.7);
  border-radius:8px;
  line-height:20px;
  font-size:16px;
  cursor:pointer;
  position:relative;
  vertical-align:top;
  padding-top:5px;
}
.selected{outline:3px solid #4da3ff;}
.colors{display:flex;justify-content:center;gap:3px;position:absolute;bottom:25px;left:0;right:0;}
.dot{width:10px;height:10px;border-radius:50%;}
.notes{font-size:12px;margin-top:5px;text-align:center;}
.controls{text-align:center;margin-top:15px;}
button{padding:6px 10px;border-radius:6px;border:none;margin:5px;}
.color-legend{margin-top:15px;padding:5px;background:rgba(0,0,0,0.6);border-radius:6px;}
.legend-item{display:inline-block;margin-right:15px;font-size:14px;}
.legend-color{display:inline-block;width:12px;height:12px;border-radius:50%;vertical-align:middle;margin-right:4px;}
input[type="text"]{padding:3px;border-radius:4px;border:none;width:80px;}
</style>
</head>
<body>
<div class="overlay">
<h1 id="month"></h1>

<div id="weekdays"></div>

<div id="calendar"></div>

<div class="controls">
<div id="selected">Выберите день</div>
<br>
<input type="color" id="color">
<input type="text" id="colorName" placeholder="Название цвета">
<button onclick="addColor()">Добавить цвет</button>
<br><br>
<input type="file" accept="image/*" onchange="setWallpaper(event)">
</div>

<div class="color-legend">
  <strong>Легенда цветов:</strong>
  <span id="legendItems"></span>
</div>
</div>

<script>
const calendar=document.getElementById("calendar");
const monthEl=document.getElementById("month");
const weekdaysEl=document.getElementById("weekdays");
const legendEl=document.getElementById("legendItems");

let now=new Date();
let year=now.getFullYear();
let month=now.getMonth();
monthEl.innerHTML=now.toLocaleString("ru",{month:"long",year:"numeric"});

const weekdayNames = ["Пн","Вт","Ср","Чт","Пт","Сб","Вс"];
weekdayNames.forEach(d=>{
  let el=document.createElement("span");
  el.className="weekday";
  el.textContent=d;
  weekdaysEl.appendChild(el);
});

let selectedDay=null;
let data=JSON.parse(localStorage.getItem("caldata")||"{}");
let legend=JSON.parse(localStorage.getItem("colorLegend")||"{}");

// Восстанавливаем общий фон при загрузке
if(localStorage.getItem("wallpaper")){
  document.body.style.backgroundImage="url("+localStorage.getItem("wallpaper")+")";
}

// Построение календаря с учётом дня недели
function buildCalendar(){
  calendar.innerHTML="";
  const daysInMonth = new Date(year, month+1,0).getDate();
  const firstDay = new Date(year,month,1).getDay(); // 0=Вск, 1=Пн...
  let offset = firstDay==0?6:firstDay-1; // сдвиг, чтобы понедельник=0
  // добавляем пустые блоки перед 1 числом
  for(let i=0;i<offset;i++){
    let empty=document.createElement("div");
    empty.className="day";
    empty.style.background="transparent";
    empty.style.cursor="default";
    calendar.appendChild(empty);
  }
  for(let i=1;i<=daysInMonth;i++){
    let d=document.createElement("div");
    d.className="day";
    d.dataset.day=i;
    let key=year+"-"+month+"-"+i;
    d.innerHTML = i;
    // отображаем цвета
    if(data[key] && data[key].colors){
      let colorsDiv=document.createElement("div");
      colorsDiv.className="colors";
      data[key].colors.forEach(c=>{
        let dot=document.createElement("div");
        dot.className="dot";
        dot.style.background=c.color;
        colorsDiv.appendChild(dot);
      });
      d.appendChild(colorsDiv);
    }
    // заметки
    if(data[key] && data[key].note){
      let noteDiv=document.createElement("div");
      noteDiv.className="notes";
      noteDiv.textContent=data[key].note;
      d.appendChild(noteDiv);
    }

    d.onclick=function(){
      selectedDay=key;
      document.getElementById("selected").innerHTML="День "+i;
      document.querySelectorAll(".day").forEach(dd=>dd.classList.remove("selected"));
      this.classList.add("selected");
      let note = prompt("Введите заметку для дня", data[selectedDay]?.note||"");
      if(note!==null){
        if(!data[selectedDay]) data[selectedDay]={colors:[]};
        data[selectedDay].note=note;
        localStorage.setItem("caldata", JSON.stringify(data));
        buildCalendar();
      }
    }
    calendar.appendChild(d);
  }
  renderLegend();
}

// Добавление цвета с названием
function addColor(){
  if(!selectedDay) return;
  let c=document.getElementById("color").value;
  let name=document.getElementById("colorName").value || "";
  if(!data[selectedDay]) data[selectedDay]={colors:[]};
  data[selectedDay].colors.push({color:c,name:name});
  localStorage.setItem("caldata", JSON.stringify(data));
  
  if(name){
    legend[c]=name;
    localStorage.setItem("colorLegend", JSON.stringify(legend));
  }
  
  buildCalendar();
}

// Отображение легенды цветов
function renderLegend(){
  legendEl.innerHTML="";
  for(let c in legend){
    let item=document.createElement("span");
    item.className="legend-item";
    item.innerHTML=`<span class="legend-color" style="background:${c}"></span>${legend[c]}`;
    legendEl.appendChild(item);
  }
}

// Общий фон
function setWallpaper(e){
  let reader=new FileReader();
  reader.onload=function(){
    let img=reader.result;
    document.body.style.backgroundImage="url("+img+")";
    localStorage.setItem("wallpaper",img);
  }
  reader.readAsDataURL(e.target.files[0]);
}

buildCalendar();
</script>
</body>
</html>
